<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">A loop for keeping unfinished questions honest</title>
  <desc id="desc">A schematic loop from unfinished tension to frame, next action, check, observation, reflection, and changed state.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#315f64"/>
    </marker>
  </defs>
  <rect width="1200" height="520" fill="#f7f4ee"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="70" fill="#213437" font-size="28" font-weight="700">A question becomes useful when it changes the next action</text>
    <text x="72" y="105" fill="#627173" font-size="17">The loop is not a scoring system. It is a discipline for making ideas meet resistance.</text>

    <g>
      <rect x="70" y="180" width="150" height="100" rx="8" fill="#fffdf8" stroke="#d0c5b5"/>
      <text x="145" y="218" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Tension</text>
      <text x="145" y="248" text-anchor="middle" fill="#687779" font-size="14">unfinished residue</text>

      <rect x="265" y="180" width="160" height="100" rx="8" fill="#fffdf8" stroke="#d0c5b5"/>
      <text x="345" y="218" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Frame</text>
      <text x="345" y="248" text-anchor="middle" fill="#687779" font-size="14">what would decide?</text>

      <rect x="470" y="180" width="150" height="100" rx="8" fill="#fffdf8" stroke="#d0c5b5"/>
      <text x="545" y="218" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Action</text>
      <text x="545" y="248" text-anchor="middle" fill="#687779" font-size="14">one bounded move</text>

      <rect x="665" y="180" width="150" height="100" rx="8" fill="#fffdf8" stroke="#d0c5b5"/>
      <text x="740" y="218" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Check</text>
      <text x="740" y="248" text-anchor="middle" fill="#687779" font-size="14">run or block clearly</text>

      <rect x="860" y="180" width="150" height="100" rx="8" fill="#fff8ec" stroke="#d7a15a"/>
      <text x="935" y="218" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Observation</text>
      <text x="935" y="248" text-anchor="middle" fill="#6f5b38" font-size="14">pressure on the idea</text>

      <rect x="665" y="340" width="180" height="100" rx="8" fill="#e7f2f0" stroke="#77aaa5"/>
      <text x="755" y="378" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Reflection</text>
      <text x="755" y="408" text-anchor="middle" fill="#4d6c70" font-size="14">change the state</text>

      <rect x="930" y="340" width="190" height="100" rx="8" fill="#fff2df" stroke="#d7a15a"/>
      <text x="1025" y="378" text-anchor="middle" fill="#22383b" font-size="20" font-weight="700">Decision</text>
      <text x="1025" y="408" text-anchor="middle" fill="#6f5b38" font-size="14">continue, revise, or stop</text>
    </g>

    <g stroke="#315f64" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M220 230 H258"/>
      <path d="M425 230 H463"/>
      <path d="M620 230 H658"/>
      <path d="M815 230 H853"/>
      <path d="M935 280 C930 328 884 370 852 384"/>
      <path d="M845 390 H922"/>
      <path d="M1020 340 C997 306 966 285 940 276"/>
    </g>

    <rect x="84" y="340" width="500" height="92" rx="8" fill="#ebe6dc" stroke="#d3c8b8"/>
    <text x="108" y="372" fill="#334447" font-size="17" font-weight="700">Practical rule</text>
    <text x="108" y="396" fill="#59686a" font-size="15">
      <tspan x="108" dy="0">Do not keep a question because it sounds deep.</tspan>
      <tspan x="108" dy="20">Keep it when it changes what will be tried next.</tspan>
    </text>
  </g>
</svg>
