<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Two routes reaching the same fork</title>
  <desc id="desc">The same unfinished tension is sent through a direct prompt and through the multi-agent workflow. Both routes arrive at the same pause-and-reset fork, so the elaborate route did not earn its complexity — a null result.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#315f64"/>
    </marker>
  </defs>
  <rect width="1200" height="560" fill="#f7f4ee"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="60" fill="#213437" font-size="28" font-weight="700">The comparison that actually mattered</text>
    <text x="72" y="94" fill="#627173" font-size="17">Send the same tension two ways and see whether the elaborate route reaches somewhere the simple one cannot.</text>

    <rect x="60" y="220" width="180" height="120" rx="8" fill="#fff8ec" stroke="#d7a15a"/>
    <text x="150" y="272" text-anchor="middle" fill="#22383b" font-size="19" font-weight="700">Unfinished</text>
    <text x="150" y="298" text-anchor="middle" fill="#22383b" font-size="19" font-weight="700">tension</text>

    <rect x="332" y="120" width="340" height="92" rx="8" fill="#fffdf8" stroke="#d0c5b5"/>
    <text x="356" y="158" fill="#22383b" font-size="19" font-weight="700">Direct prompt / simple checklist</text>
    <text x="356" y="186" fill="#687779" font-size="14">ask once</text>

    <rect x="332" y="330" width="372" height="118" rx="8" fill="#fffdf8" stroke="#d0c5b5"/>
    <text x="356" y="368" fill="#22383b" font-size="19" font-weight="700">Multi-agent workflow</text>
    <text x="356" y="396" fill="#687779" font-size="14">problem-former · toy-builder ·</text>
    <text x="356" y="418" fill="#687779" font-size="14">counterexample-hunter · boringness-critic</text>

    <rect x="784" y="218" width="244" height="124" rx="8" fill="#e7f2f0" stroke="#77aaa5"/>
    <text x="906" y="262" text-anchor="middle" fill="#22383b" font-size="19" font-weight="700">The same</text>
    <text x="906" y="288" text-anchor="middle" fill="#22383b" font-size="19" font-weight="700">pause-and-reset fork</text>
    <text x="906" y="314" text-anchor="middle" fill="#4d6c70" font-size="12">kinetic relaxation vs structural change</text>

    <g stroke="#315f64" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M236 262 Q300 210 328 178"/>
      <path d="M236 300 Q300 350 328 374"/>
      <path d="M676 166 Q740 210 780 244"/>
      <path d="M708 388 Q752 348 782 318"/>
    </g>

    <rect x="332" y="476" width="696" height="64" rx="8" fill="#ebe6dc" stroke="#d3c8b8"/>
    <text x="356" y="506" fill="#334447" font-size="16" font-weight="700">Null result</text>
    <text x="356" y="528" fill="#59686a" font-size="15">The simple route reached the same fork — so the elaborate one didn't earn its complexity.</text>
  </g>
</svg>
