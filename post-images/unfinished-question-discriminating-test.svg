<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Pause and reset test separating kinetic memory from structural residue</title>
  <desc id="desc">A labelled schematic showing how pause duration and reset duration can separate a kinetic relaxation explanation from a structural residue explanation.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#315f64"/>
    </marker>
  </defs>
  <rect width="1200" height="680" fill="#fbfaf7"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="72" fill="#20363a" font-size="31" font-weight="700">A better question separates two mechanisms</text>
    <text x="72" y="108" fill="#627174" font-size="17">The useful local result was not a claim of discovery. It was a sharper falsifying test.</text>

    <g stroke="#315f64" stroke-width="3" fill="none" marker-end="url(#arrow)">
      <path d="M242 310 H322"/>
      <path d="M878 310 H958"/>
    </g>

    <g>
      <rect x="72" y="214" width="170" height="192" rx="10" fill="#ffffff" stroke="#b9c4c5" stroke-width="2"/>
      <text x="157" y="252" text-anchor="middle" fill="#20363a" font-size="19" font-weight="700">Observation</text>
      <text x="157" y="290" text-anchor="middle" fill="#627174" font-size="15">
        <tspan x="157" dy="0">response depends</tspan>
        <tspan x="157" dy="22">on history</tspan>
      </text>
      <path d="M112 348 H202" stroke="#d4cabd" stroke-width="2"/>
      <text x="157" y="378" text-anchor="middle" fill="#627174" font-size="14">but why?</text>
    </g>

    <g>
      <rect x="322" y="160" width="556" height="300" rx="12" fill="#eef6f5" stroke="#6d9d9a" stroke-width="2"/>
      <text x="600" y="198" text-anchor="middle" fill="#20363a" font-size="21" font-weight="700">Two-axis check</text>
      <text x="600" y="226" text-anchor="middle" fill="#557073" font-size="15">vary the waiting pause and the reset duration</text>

      <g>
        <rect x="360" y="258" width="214" height="132" rx="8" fill="#ffffff" stroke="#aab8ba"/>
        <text x="467" y="286" text-anchor="middle" fill="#20363a" font-size="17" font-weight="700">If memory is kinetic</text>
        <path d="M392 354 C428 298 482 308 540 348" fill="none" stroke="#2f7a7c" stroke-width="4"/>
        <path d="M390 364 H544" stroke="#c4cecf" stroke-width="2"/>
        <text x="467" y="412" text-anchor="middle" fill="#557073" font-size="14">reset erases gradually</text>
      </g>

      <g>
        <rect x="626" y="258" width="214" height="132" rx="8" fill="#ffffff" stroke="#aab8ba"/>
        <text x="733" y="286" text-anchor="middle" fill="#20363a" font-size="17" font-weight="700">If residue is structural</text>
        <path d="M660 350 C690 304 734 320 804 320" fill="none" stroke="#c99032" stroke-width="4"/>
        <path d="M658 364 H812" stroke="#c4cecf" stroke-width="2"/>
        <text x="733" y="412" text-anchor="middle" fill="#6f5b38" font-size="14">reset leaves a plateau</text>
      </g>
    </g>

    <g>
      <rect x="958" y="214" width="170" height="192" rx="10" fill="#fff2e8" stroke="#c68463" stroke-width="2"/>
      <text x="1043" y="252" text-anchor="middle" fill="#20363a" font-size="19" font-weight="700">Next action</text>
      <text x="1043" y="292" text-anchor="middle" fill="#765747" font-size="15">
        <tspan x="1043" dy="0">choose the</tspan>
        <tspan x="1043" dy="22">measurement that</tspan>
        <tspan x="1043" dy="22">splits the curves</tspan>
      </text>
    </g>

    <rect x="200" y="536" width="800" height="72" rx="9" fill="#ffffff" stroke="#d4cabd" stroke-width="2"/>
    <text x="600" y="565" text-anchor="middle" fill="#20363a" font-size="18" font-weight="700">Interpretation boundary</text>
    <text x="600" y="592" text-anchor="middle" fill="#627174" font-size="15">A local simulation can sharpen this test; only real contact can make it evidence.</text>
  </g>
</svg>
