<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Failure modes in AI-assisted problem formation</title>
  <desc id="desc">A multi-panel schematic showing common failure modes and the corresponding design countermeasures for AI-assisted research workflows.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#355f64"/>
    </marker>
  </defs>
  <rect width="1200" height="720" fill="#fbfaf7"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="72" fill="#20363a" font-size="31" font-weight="700">Failure modes are easier to fix when they are named</text>
    <text x="72" y="108" fill="#637275" font-size="17">
      <tspan x="72" dy="0">The point is not to make the system sound smarter.</tspan>
      <tspan x="72" dy="24">The point is to prevent research-shaped output from replacing research-state change.</tspan>
    </text>

    <g>
      <rect x="70" y="160" width="490" height="120" rx="8" fill="#ffffff" stroke="#cfc5b7" stroke-width="2"/>
      <text x="96" y="198" fill="#20363a" font-size="20" font-weight="700">A. Fluent closure</text>
      <text x="96" y="228" fill="#647174" font-size="15">The explanation becomes smooth before the question has met a test.</text>
      <path d="M410 236 H500" fill="none" stroke="#355f64" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="96" y="258" fill="#466a6d" font-size="15" font-weight="700">Countermeasure: preserve the unresolved residue.</text>
    </g>

    <g>
      <rect x="640" y="160" width="490" height="120" rx="8" fill="#ffffff" stroke="#cfc5b7" stroke-width="2"/>
      <text x="666" y="198" fill="#20363a" font-size="20" font-weight="700">B. Metric capture</text>
      <text x="666" y="228" fill="#647174" font-size="15">Scores, fields, and summaries become the target.</text>
      <path d="M980 236 H1070" fill="none" stroke="#355f64" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="666" y="258" fill="#466a6d" font-size="15" font-weight="700">Countermeasure: use checks as brakes, not rewards.</text>
    </g>

    <g>
      <rect x="70" y="325" width="490" height="120" rx="8" fill="#ffffff" stroke="#cfc5b7" stroke-width="2"/>
      <text x="96" y="363" fill="#20363a" font-size="20" font-weight="700">C. Metaphor drift</text>
      <text x="96" y="393" fill="#647174" font-size="15">A label or analogy looks explanatory but does no operational work.</text>
      <path d="M410 401 H500" fill="none" stroke="#355f64" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="96" y="423" fill="#466a6d" font-size="15" font-weight="700">Countermeasure: require variables, controls, and failure cases.</text>
    </g>

    <g>
      <rect x="640" y="325" width="490" height="120" rx="8" fill="#ffffff" stroke="#cfc5b7" stroke-width="2"/>
      <text x="666" y="363" fill="#20363a" font-size="20" font-weight="700">D. Shape convergence</text>
      <text x="666" y="393" fill="#647174" font-size="15">Different prompts converge to the same obvious test shape.</text>
      <path d="M980 401 H1070" fill="none" stroke="#355f64" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="666" y="421" fill="#466a6d" font-size="15" font-weight="700">
        <tspan x="666" dy="0">Countermeasure: compare with simple baselines</tspan>
        <tspan x="666" dy="19">and neutral labels.</tspan>
      </text>
    </g>

    <g>
      <rect x="70" y="490" width="490" height="120" rx="8" fill="#ffffff" stroke="#cfc5b7" stroke-width="2"/>
      <text x="96" y="528" fill="#20363a" font-size="20" font-weight="700">E. Local-only evidence</text>
      <text x="96" y="558" fill="#647174" font-size="15">A toy check sharpens the question but is promoted too far.</text>
      <path d="M410 566 H500" fill="none" stroke="#355f64" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="96" y="588" fill="#466a6d" font-size="15" font-weight="700">Countermeasure: mark the missing external contact explicitly.</text>
    </g>

    <g>
      <rect x="640" y="490" width="490" height="120" rx="8" fill="#fff3e7" stroke="#c68463" stroke-width="2"/>
      <text x="666" y="528" fill="#20363a" font-size="20" font-weight="700">F. Reporting loop</text>
      <text x="666" y="558" fill="#765747" font-size="15">When contact is missing, the workflow keeps adding interpretation.</text>
      <path d="M980 566 H1070" fill="none" stroke="#9e5f4b" stroke-width="3" marker-end="url(#arrow)"/>
      <text x="666" y="588" fill="#7b5145" font-size="15" font-weight="700">Countermeasure: stop until a stronger observation is available.</text>
    </g>
  </g>
</svg>
