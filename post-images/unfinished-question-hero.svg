<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Schematic for turning unfinished questions into tests</title>
  <desc id="desc">A clean schematic showing an unfinished question becoming a frame, intervention, observation, and revised next move.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0 L10 5 L0 10 z" fill="#27484d"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#fbfaf7"/>
  <g font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <text x="72" y="78" fill="#20363a" font-size="34" font-weight="700">From Unfinished Question to Testable Contact</text>
    <text x="72" y="116" fill="#607174" font-size="18">A workflow is useful when an unresolved tension changes what is done next.</text>

    <g fill="none" stroke="#27484d" stroke-width="3" marker-end="url(#arrow)">
      <path d="M210 286 H316"/>
      <path d="M462 286 H568"/>
      <path d="M714 286 H820"/>
      <path d="M966 286 H1056"/>
      <path d="M884 352 C876 424 790 458 708 458"/>
    </g>

    <g>
      <rect x="72" y="210" width="138" height="152" rx="6" fill="#ffffff" stroke="#aab8ba" stroke-width="2"/>
      <text x="141" y="258" text-anchor="middle" fill="#20363a" font-size="22" font-weight="700">Tension</text>
      <text x="141" y="294" text-anchor="middle" fill="#667578" font-size="15">something</text>
      <text x="141" y="318" text-anchor="middle" fill="#667578" font-size="15">does not close</text>
    </g>

    <g>
      <rect x="320" y="210" width="142" height="152" rx="6" fill="#ffffff" stroke="#aab8ba" stroke-width="2"/>
      <text x="391" y="258" text-anchor="middle" fill="#20363a" font-size="22" font-weight="700">Frame</text>
      <text x="391" y="294" text-anchor="middle" fill="#667578" font-size="15">make the</text>
      <text x="391" y="318" text-anchor="middle" fill="#667578" font-size="15">question precise</text>
    </g>

    <g>
      <rect x="572" y="210" width="142" height="152" rx="6" fill="#ffffff" stroke="#aab8ba" stroke-width="2"/>
      <text x="643" y="258" text-anchor="middle" fill="#20363a" font-size="22" font-weight="700">Intervene</text>
      <text x="643" y="294" text-anchor="middle" fill="#667578" font-size="15">choose a</text>
      <text x="643" y="318" text-anchor="middle" fill="#667578" font-size="15">discriminating test</text>
    </g>

    <g>
      <rect x="824" y="210" width="142" height="152" rx="6" fill="#fff9ed" stroke="#c79a53" stroke-width="2"/>
      <text x="895" y="258" text-anchor="middle" fill="#20363a" font-size="22" font-weight="700">Observe</text>
      <text x="895" y="294" text-anchor="middle" fill="#6e5c38" font-size="15">let the world,</text>
      <text x="895" y="318" text-anchor="middle" fill="#6e5c38" font-size="15">model, or data</text>
      <text x="895" y="342" text-anchor="middle" fill="#6e5c38" font-size="15">push back</text>
    </g>

    <g>
      <rect x="1060" y="210" width="88" height="152" rx="6" fill="#ffffff" stroke="#aab8ba" stroke-width="2"/>
      <text x="1104" y="258" text-anchor="middle" fill="#20363a" font-size="22" font-weight="700">Revise</text>
      <text x="1104" y="294" text-anchor="middle" fill="#667578" font-size="15">next</text>
      <text x="1104" y="318" text-anchor="middle" fill="#667578" font-size="15">move</text>
    </g>

    <rect x="72" y="428" width="290" height="104" rx="6" fill="#eef5f4" stroke="#6d9d9a" stroke-width="2"/>
    <text x="217" y="468" text-anchor="middle" fill="#20363a" font-size="20" font-weight="700">Keep the question alive</text>
    <text x="217" y="496" text-anchor="middle" fill="#557073" font-size="15">
      <tspan x="217" dy="0">only if it changes attention,</tspan>
      <tspan x="217" dy="22">memory, or action</tspan>
    </text>

    <rect x="456" y="428" width="252" height="104" rx="6" fill="#eef5f4" stroke="#6d9d9a" stroke-width="2"/>
    <text x="582" y="468" text-anchor="middle" fill="#20363a" font-size="20" font-weight="700">Prefer split tests</text>
    <text x="582" y="496" text-anchor="middle" fill="#557073" font-size="15">
      <tspan x="582" dy="0">one observation should</tspan>
      <tspan x="582" dy="22">separate alternatives</tspan>
    </text>

    <rect x="802" y="428" width="346" height="104" rx="6" fill="#fff1e8" stroke="#bd745d" stroke-width="2"/>
    <text x="975" y="462" text-anchor="middle" fill="#20363a" font-size="20" font-weight="700">
      <tspan x="975" dy="0">Stop when only</tspan>
      <tspan x="975" dy="24">wording improves</tspan>
    </text>
    <text x="975" y="514" text-anchor="middle" fill="#7b5145" font-size="15">better prose is not progress</text>
  </g>
</svg>
